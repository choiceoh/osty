name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOFLAGS: -mod=readonly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Format
        run: |
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Build Osty CLI
        run: |
          mkdir -p "$RUNNER_TEMP/osty-ci"
          go build -o "$RUNNER_TEMP/osty-ci/osty" ./cmd/osty
          echo "OSTY_BIN=$RUNNER_TEMP/osty-ci/osty" >> "$GITHUB_ENV"

      - name: Osty repair
        run: |
          while IFS= read -r file; do
            case "$file" in
              testdata/spec/negative/*) continue ;;
            esac
            "$OSTY_BIN" repair --check "$file"
          done < <(git ls-files '*.osty')

      - name: Osty CI
        run: |
          "$OSTY_BIN" ci .

      - name: Verify generated selfhost front end
        run: |
          go generate ./internal/selfhost
          git diff --exit-code -- internal/selfhost/generated.go

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -vet=off ./...
