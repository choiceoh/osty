name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go
    runs-on: self-hosted
    timeout-minutes: 15
    env:
      GOFLAGS: -mod=readonly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify clean archive build
        run: |
          clean="$RUNNER_TEMP/osty-clean"
          bin="$RUNNER_TEMP/osty-clean-bin"
          rm -rf "$clean"
          rm -rf "$bin"
          mkdir -p "$clean"
          mkdir -p "$bin"
          git archive --format=tar HEAD | tar -xf - -C "$clean"
          (
            cd "$clean"
            go build -o "$bin/osty" ./cmd/osty
          )

      - name: Format
        run: |
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Build Osty CLI
        run: |
          mkdir -p "$RUNNER_TEMP/osty-ci"
          go build -o "$RUNNER_TEMP/osty-ci/osty" ./cmd/osty
          echo "OSTY_BIN=$RUNNER_TEMP/osty-ci/osty" >> "$GITHUB_ENV"

      - name: Osty repair
        run: |
          while IFS= read -r file; do
            case "$file" in
              testdata/spec/negative/*|internal/airepair/testdata/corpus/*.input.osty) continue ;;
            esac
            "$OSTY_BIN" repair --check "$file"
          done < <(git ls-files '*.osty')

      - name: Osty airepair backlog
        if: always()
        run: |
          bash scripts/airepair-update-backlog.sh "$OSTY_BIN" "$RUNNER_TEMP/airepair-cases" /tmp/todo-airepair.md
          if ! diff -q todo-airepair.md /tmp/todo-airepair.md >/dev/null 2>&1; then
            echo "::warning::todo-airepair.md is stale — run \`just airepair-capture\` and commit the result"
            diff -u todo-airepair.md /tmp/todo-airepair.md || true
          fi

      - name: Osty CI
        run: |
          "$OSTY_BIN" ci .

      - name: Verify selfhost snapshot parity
        run: |
          go test -count=1 -vet=off -run 'SnapshotParity|CoreSnapshotParity' \
            ./internal/ci ./internal/runner

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -vet=off ./...

  cross-compile:
    name: Cross-compile (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: self-hosted
    needs: go
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    env:
      GOFLAGS: -mod=readonly
      CGO_ENABLED: "0"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build osty CLI
        run: |
          out="$RUNNER_TEMP/osty-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "$out"
          suffix=""
          if [ "${{ matrix.goos }}" = "windows" ]; then suffix=".exe"; fi
          go build -o "$out/osty$suffix" ./cmd/osty

      - name: Build osty-native-checker
        run: |
          out="$RUNNER_TEMP/osty-${{ matrix.goos }}-${{ matrix.goarch }}"
          suffix=""
          if [ "${{ matrix.goos }}" = "windows" ]; then suffix=".exe"; fi
          go build -o "$out/osty-native-checker$suffix" ./cmd/osty-native-checker
